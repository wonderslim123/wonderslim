<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome To Wonderslim</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    overflow-y:auto;
}

/* 背景固定 */
.background-layer{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
}

.background-layer img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    display:block;
}

/* 黑色遮罩 */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.1);
    z-index:0;
}

/* 内容 */
.content{
    position:relative;
    z-index:1;
    padding:40px;
    color:white;
}

.content h1{
    font-size:50px;
    margin-bottom:20px;
}

.content p{
    font-size:18px;
    margin-bottom:20px;
    line-height:1.8;
}

.btn{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:white;
    color:#333;
    cursor:pointer;
    font-size:16px;
}

.btn:hover{
    opacity:0.9;
}

/* 手机版 */
@media screen and (max-width:768px){

    .content{
        padding:20px;
    }

    .content h1{
        font-size:32px;
    }

    .content p{
        font-size:16px;
    }

}

</style>
</head>

<body>

<!-- 背景图片 -->
<div class="background-layer">
    <img src="./wonderslimmain.png" alt="Background">
</div>

<!-- 遮罩 -->
<div class="overlay"></div>

<!-- 内容 -->
<div class="content">

    <h1>Welcome To Wonderslim</h1>

    <p>Your Beauty & Wellness Journey Starts Here</p>

</div>

</body>
</html>
